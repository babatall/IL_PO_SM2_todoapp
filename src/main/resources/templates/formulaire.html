<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${modeEdition} ? 'Modifier la tâche' : 'Nouvelle tâche'">Tâche</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    <style>
        body    { background-color: #f0f2f5; }
        .navbar { background: linear-gradient(135deg, #1a1a2e, #16213e); }
    </style>
</head>
<body>

<nav class="navbar navbar-dark px-4 py-3">
    <a th:href="@{/tasks}" class="navbar-brand fw-bold">
        <i class="bi bi-arrow-left me-2"></i>Retour à la liste
    </a>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="card shadow border-0 rounded-4 p-4">
                <div class="card-body">

                    <!-- En-tête -->
                    <div class="text-center mb-4">
                        <div class="mb-3">
              <span th:if="${!modeEdition}"
                    class="bg-primary bg-opacity-10 text-primary rounded-circle
                           d-inline-flex align-items-center justify-content-center"
                    style="width:64px;height:64px;font-size:1.8rem;">
                <i class="bi bi-plus-circle"></i>
              </span>
                            <span th:if="${modeEdition}"
                                  class="bg-warning bg-opacity-10 text-warning rounded-circle
                           d-inline-flex align-items-center justify-content-center"
                                  style="width:64px;height:64px;font-size:1.8rem;">
                <i class="bi bi-pencil-square"></i>
              </span>
                        </div>
                        <h4 class="fw-bold"
                            th:text="${modeEdition} ? 'Modifier la tâche' : 'Nouvelle tâche'">
                        </h4>
                        <p class="text-muted small">Remplissez les informations ci-dessous</p>
                    </div>

                    <!-- Formulaire -->
                    <form th:action="${modeEdition}
                        ? @{/tasks/modifier/{id}(id=${taskDTO.id})}
                         : @{/tasks/nouveau}"
                          th:object="${taskDTO}"
                          method="post">

                        <!-- Titre -->
                        <div class="mb-3">
                            <label for="titre" class="form-label fw-semibold">
                                <i class="bi bi-type me-1 text-primary"></i>Titre
                                <span class="text-danger">*</span>
                            </label>
                            <input type="text"
                                   id="titre"
                                   th:field="*{titre}"
                                   class="form-control form-control-lg"
                                   th:classappend="${#fields.hasErrors('titre')} ? 'is-invalid'"
                                   placeholder="Ex: Préparer le rapport mensuel"/>
                            <div class="invalid-feedback" th:errors="*{titre}"></div>
                        </div>

                        <!-- Description -->
                        <div class="mb-3">
                            <label for="description" class="form-label fw-semibold">
                                <i class="bi bi-text-paragraph me-1 text-primary"></i>Description
                            </label>
                            <textarea id="description"
                                      th:field="*{description}"
                                      class="form-control"
                                      th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"
                                      rows="4"
                                      placeholder="Décrivez le détail de la tâche..."></textarea>
                            <div class="invalid-feedback" th:errors="*{description}"></div>
                        </div>

                        <!-- Statut (mode édition uniquement) -->
                        <div class="mb-4" th:if="${modeEdition}">
                            <label for="statut" class="form-label fw-semibold">
                                <i class="bi bi-flag me-1 text-primary"></i>Statut
                            </label>
                            <select id="statut" th:field="*{statut}" class="form-select">
                                <option th:each="s : ${statuts}"
                                        th:value="${s}"
                                        th:text="${s.libelle}">
                                </option>
                            </select>
                        </div>

                        <!-- Boutons -->
                        <div class="d-flex gap-2 mt-4">
                            <a th:href="@{/tasks}" class="btn btn-outline-secondary flex-fill">
                                <i class="bi bi-x-lg me-1"></i>Annuler
                            </a>
                            <button type="submit"
                                    class="btn flex-fill fw-bold"
                                    th:classappend="${modeEdition} ? 'btn-warning' : 'btn-primary'">
                                <i th:class="${modeEdition} ? 'bi bi-save me-1' : 'bi bi-plus-lg me-1'"></i>
                                <span th:text="${modeEdition} ? 'Enregistrer' : 'Créer la tâche'"></span>
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
